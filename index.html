<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KOSPI Chart">
<title>KOSPI Real-Time Chart</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>
:root {
  --bg: #0b0f19;
  --card: #111827;
  --border: #1e293b;
  --text1: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #60a5fa;
  --up: #ef4444;
  --down: #3b82f6;
  --green: #22c55e;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { background:var(--bg); color:var(--text1); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; overflow-x:hidden; }
body { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; }

.header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; position:sticky; top:0; background:var(--bg); z-index:100; }
.header h1 { font-size:18px; font-weight:700; }
.header h1 span { color:var(--accent); }
.add-btn { width:36px; height:36px; border-radius:50%; background:var(--accent); color:#fff; border:none; font-size:22px; line-height:36px; text-align:center; cursor:pointer; }

.input-panel { display:none; padding:0 16px 12px; }
.input-panel.show { display:block; }
.input-row { display:flex; gap:8px; margin-bottom:10px; }
.input-row input { flex:1; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--text1); font-size:15px; outline:none; }
.input-row input::placeholder { color:var(--text3); }
.input-row button { padding:10px 16px; border-radius:10px; border:none; font-size:14px; font-weight:600; cursor:pointer; }
.btn-add { background:var(--accent); color:#fff; }
.btn-cancel { background:var(--border); color:var(--text2); }

.charts-area { padding:0 12px 20px; }
.chart-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:12px; position:relative; }
.chart-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.chart-info { flex:1; }
.stock-name { font-size:15px; font-weight:700; color:var(--text1); }
.stock-code { font-size:11px; color:var(--text3); margin-top:1px; }
.stock-price { font-size:22px; font-weight:700; margin-top:4px; }
.stock-change { font-size:12px; margin-top:2px; }
.chart-controls { display:flex; align-items:center; gap:6px; }
.refresh-select { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:5px 8px; color:var(--text2); font-size:11px; outline:none; -webkit-appearance:none; }
.remove-btn { width:28px; height:28px; border-radius:50%; background:transparent; border:1px solid var(--border); color:var(--text3); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.chart-wrap { height:180px; position:relative; }
.chart-status { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--text3); margin-top:4px; }
.status-dot { width:6px; height:6px; border-radius:50%; }
.status-dot.live { background:var(--green); animation:pulse 1.5s infinite; }
.status-dot.error { background:var(--up); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.line-inputs { display:flex; gap:6px; margin-top:8px; align-items:center; }
.line-inputs label { font-size:11px; font-weight:700; width:14px; text-align:center; }
.line-inputs input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:6px 8px; color:var(--text1); font-size:12px; outline:none; text-align:center; }
.line-inputs input.yellow-line { border-color:#eab308; }
.line-inputs input.white-line { border-color:rgba(255,255,255,0.5); }

.empty-state { text-align:center; padding:80px 40px; }
.empty-icon { font-size:48px; margin-bottom:16px; opacity:0.3; }
.empty-text { color:var(--text3); font-size:14px; line-height:1.6; }

.toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:#334155; color:var(--text1); padding:10px 20px; border-radius:20px; font-size:13px; z-index:300; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.toast.show { opacity:1; }
::-webkit-scrollbar { display:none; }
</style>
</head>
<body>

<div class="header">
  <h1><span>KOSPI</span> Chart</h1>
  <button class="add-btn" id="addToggle">+</button>
</div>

<div class="input-panel" id="inputPanel">
  <div class="input-row">
    <input type="text" id="tickerInput" placeholder="종목코드 (예: 005930)" inputmode="numeric" maxlength="6">
    <button class="btn-add" id="addStock">추가</button>
    <button class="btn-cancel" id="cancelAdd">취소</button>
  </div>
</div>

<div class="charts-area" id="chartsArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📈</div>
    <div class="empty-text">종목을 추가해주세요<br>최대 3개까지 동시에 볼 수 있습니다</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var CORS_PROXY = 'https://corsproxy.io/?';
var MAX_STOCKS = 3;
var stocks = [];

var chartsArea = document.getElementById('chartsArea');
var emptyState = document.getElementById('emptyState');
var inputPanel = document.getElementById('inputPanel');
var tickerInput = document.getElementById('tickerInput');
var addToggle = document.getElementById('addToggle');
var addStockBtn = document.getElementById('addStock');
var cancelAddBtn = document.getElementById('cancelAdd');
var toastEl = document.getElementById('toast');

var toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2500);
}

addToggle.addEventListener('click', function() {
  if (stocks.length >= MAX_STOCKS) { showToast('최대 3개까지만 추가할 수 있습니다'); return; }
  inputPanel.classList.toggle('show');
  if (inputPanel.classList.contains('show')) tickerInput.focus();
});
cancelAddBtn.addEventListener('click', function() { inputPanel.classList.remove('show'); tickerInput.value = ''; });
addStockBtn.addEventListener('click', function() { addNewStock(); });
tickerInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') addNewStock(); });

function fetchStockData(code) {
  var symbol = code + '.KS';
  var url = CORS_PROXY + 'https://query1.finance.yahoo.com/v8/finance/chart/' + symbol + '?range=1d&interval=5m';
  return fetch(url).then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).then(function(json) {
    var result = json.chart.result[0];
    var meta = result.meta;
    var timestamps = result.timestamp || [];
    var closes = result.indicators.quote[0].close || [];
    var labels = timestamps.map(function(t) {
      var d = new Date(t * 1000);
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    });
    var prices = closes.map(function(c) { return c !== null ? Math.round(c) : null; });
    return {
      name: meta.symbol.replace('.KS', ''),
      longName: meta.longName || meta.shortName || code,
      price: meta.regularMarketPrice,
      prevClose: meta.chartPreviousClose || meta.previousClose,
      labels: labels,
      prices: prices,
      ok: true
    };
  }).catch(function(e) {
    console.error('Fetch error:', e);
    return { ok: false, error: e.message };
  });
}

function addNewStock() {
  var code = tickerInput.value.trim();
  if (!code) { showToast('종목코드를 입력해주세요'); return; }
  if (!/^\d{6}$/.test(code)) { showToast('6자리 숫자 종목코드를 입력해주세요'); return; }
  if (stocks.find(function(s) { return s.code === code; })) { showToast('이미 추가된 종목입니다'); return; }
  if (stocks.length >= MAX_STOCKS) { showToast('최대 3개까지만 추가할 수 있습니다'); return; }

  inputPanel.classList.remove('show');
  tickerInput.value = '';

  var stock = { code: code, name: code, interval: 3, timer: null, data: null, chart: null, el: null, yellowLine: null, whiteLine: null };
  stocks.push(stock);
  createChartCard(stock);
  updateEmpty();
  refreshStock(stock);
  startTimer(stock);
}

function updateAnnotations(stock) {
  var annotations = {};
  if (stock.yellowLine !== null) {
    annotations.yellowLine = {
      type: 'line', yMin: stock.yellowLine, yMax: stock.yellowLine,
      borderColor: '#eab308', borderWidth: 1.5, borderDash: [6, 3],
      label: { display: true, content: stock.yellowLine.toLocaleString(), position: 'start', backgroundColor: 'rgba(234,179,8,0.6)', color: '#000', font: { size: 9 }, padding: 2 }
    };
  }
  if (stock.whiteLine !== null) {
    annotations.whiteLine = {
      type: 'line', yMin: stock.whiteLine, yMax: stock.whiteLine,
      borderColor: '#ffffff', borderWidth: 1.5, borderDash: [6, 3],
      label: { display: true, content: stock.whiteLine.toLocaleString(), position: 'start', backgroundColor: 'rgba(255,255,255,0.6)', color: '#000', font: { size: 9 }, padding: 2 }
    };
  }
  stock.chart.options.plugins.annotation = { annotations: annotations };
  stock.chart.update();
}

function createChartCard(stock) {
  var card = document.createElement('div');
  card.className = 'chart-card';

  var topDiv = document.createElement('div');
  topDiv.className = 'chart-top';

  var infoDiv = document.createElement('div');
  infoDiv.className = 'chart-info';
  infoDiv.innerHTML = '<div class="stock-name">' + stock.code + '</div>' +
    '<div class="stock-code">' + stock.code + '.KS</div>' +
    '<div class="stock-price">--</div>' +
    '<div class="stock-change">--</div>' +
    '<div class="chart-status"><div class="status-dot"></div><span class="status-text">로딩 중...</span></div>';

  var ctrlDiv = document.createElement('div');
  ctrlDiv.className = 'chart-controls';

  var sel = document.createElement('select');
  sel.className = 'refresh-select';
  sel.title = '리프레시 간격';
  [1,2,3,5,7,10].forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m + '분';
    if (m === 3) opt.selected = true;
    sel.appendChild(opt);
  });

  var rmBtn = document.createElement('button');
  rmBtn.className = 'remove-btn';
  rmBtn.title = '삭제';
  rmBtn.innerHTML = '&times;';

  ctrlDiv.appendChild(sel);
  ctrlDiv.appendChild(rmBtn);
  topDiv.appendChild(infoDiv);
  topDiv.appendChild(ctrlDiv);

  var chartWrap = document.createElement('div');
  chartWrap.className = 'chart-wrap';
  var canvas = document.createElement('canvas');
  chartWrap.appendChild(canvas);

  var lineDiv = document.createElement('div');
  lineDiv.className = 'line-inputs';
  lineDiv.innerHTML = '<label style="color:#eab308">Y</label>' +
    '<input type="text" class="yellow-line" placeholder="노랑선 가격" inputmode="decimal">' +
    '<label style="color:#fff">W</label>' +
    '<input type="text" class="white-line" placeholder="흰색선 가격" inputmode="decimal">';

  card.appendChild(topDiv);
  card.appendChild(chartWrap);
  card.appendChild(lineDiv);
  chartsArea.appendChild(card);
  stock.el = card;

  var ctx = canvas.getContext('2d');
  var gradient = ctx.createLinearGradient(0, 0, 0, 180);
  gradient.addColorStop(0, 'rgba(96,165,250,0.25)');
  gradient.addColorStop(1, 'rgba(96,165,250,0.01)');

  stock.chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        data: [],
        borderColor: '#60a5fa',
        borderWidth: 1.8,
        pointRadius: 0,
        fill: true,
        backgroundColor: gradient,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        annotation: { annotations: {} },
        tooltip: {
          backgroundColor: '#1e293b',
          titleColor: '#94a3b8',
          bodyColor: '#f1f5f9',
          borderColor: '#334155',
          borderWidth: 1,
          padding: 8,
          displayColors: false,
          callbacks: {
            label: function(c) { return c.parsed.y !== null ? c.parsed.y.toLocaleString() + '원' : ''; }
          }
        }
      },
      scales: {
        x: { grid: { color: '#1e293b30' }, ticks: { color: '#475569', maxTicksLimit: 5, font: { size: 10 } } },
        y: { grid: { color: '#1e293b30' }, ticks: { color: '#475569', font: { size: 10 }, callback: function(v) { return (v/1000).toFixed(0) + 'K'; } } }
      }
    }
  });

  sel.addEventListener('change', function(e) {
    stock.interval = parseInt(e.target.value);
    startTimer(stock);
    showToast(stock.name + ' 리프레시: ' + stock.interval + '분');
  });

  rmBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    removeStock(stock);
  });

  card.querySelector('.yellow-line').addEventListener('change', function(e) {
    var v = parseFloat(e.target.value.replace(/,/g, ''));
    stock.yellowLine = isNaN(v) ? null : v;
    updateAnnotations(stock);
  });

  card.querySelector('.white-line').addEventListener('change', function(e) {
    var v = parseFloat(e.target.value.replace(/,/g, ''));
    stock.whiteLine = isNaN(v) ? null : v;
    updateAnnotations(stock);
  });
}

function refreshStock(stock) {
  var statusDot = stock.el.querySelector('.status-dot');
  var statusText = stock.el.querySelector('.status-text');

  fetchStockData(stock.code).then(function(result) {
    if (result.ok) {
      stock.data = result;
      stock.name = result.longName;
      stock.el.querySelector('.stock-name').textContent = result.longName;
      stock.el.querySelector('.stock-code').textContent = stock.code + '.KS';

      var price = result.price;
      var change = price - result.prevClose;
      var pct = (change / result.prevClose * 100);
      var isUp = change >= 0;

      stock.el.querySelector('.stock-price').textContent = Math.round(price).toLocaleString() + '원';
      stock.el.querySelector('.stock-price').style.color = isUp ? 'var(--up)' : 'var(--down)';

      var sign = isUp ? '+' : '';
      var changeEl = stock.el.querySelector('.stock-change');
      changeEl.textContent = sign + Math.round(change).toLocaleString() + ' (' + sign + pct.toFixed(2) + '%)';
      changeEl.style.color = isUp ? 'var(--up)' : 'var(--down)';

      stock.chart.data.labels = result.labels;
      stock.chart.data.datasets[0].data = result.prices;

      var lineColor = isUp ? '#ef4444' : '#3b82f6';
      stock.chart.data.datasets[0].borderColor = lineColor;
      var ctx = stock.chart.ctx;
      var grad = ctx.createLinearGradient(0, 0, 0, 180);
      grad.addColorStop(0, (isUp ? 'rgba(239,68,68,' : 'rgba(59,130,246,') + '0.2)');
      grad.addColorStop(1, (isUp ? 'rgba(239,68,68,' : 'rgba(59,130,246,') + '0.01)');
      stock.chart.data.datasets[0].backgroundColor = grad;
      stock.chart.update();

      statusDot.className = 'status-dot live';
      var now = new Date();
      statusText.textContent = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0') + ' 갱신';
    } else {
      statusDot.className = 'status-dot error';
      statusText.textContent = '데이터 오류';
      showToast(stock.code + ': 데이터를 가져올 수 없습니다');
    }
  });
}

function startTimer(stock) {
  if (stock.timer) clearInterval(stock.timer);
  stock.timer = setInterval(function() { refreshStock(stock); }, stock.interval * 60 * 1000);
}

function removeStock(stock) {
  if (stock.timer) clearInterval(stock.timer);
  if (stock.chart) stock.chart.destroy();
  stock.el.remove();
  stocks = stocks.filter(function(s) { return s !== stock; });
  updateEmpty();
  showToast('종목이 삭제되었습니다');
}

function updateEmpty() {
  emptyState.style.display = stocks.length === 0 ? '' : 'none';
}
</script>
</body>
</html>
